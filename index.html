<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Viral Trends - Today's Hot Movies</title>
    
    <meta name="description" content="Watch the latest trending movie stories. High-quality visuals and AI reviews.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .story-wrapper { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .story-wrapper::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; position: relative; }
        
        /* Animated Progress Bar */
        .progress-container { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; }
        .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .progress-inner { height: 100%; background: #fff; width: 0%; transition: width linear; }

        /* Text Styling */
        .text-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0) 100%); 
            padding: 40px 20px 60px; 
        }
        .trending-tag { background: #ff0000; color: #fff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="progress-container" id="p-container"></div>

    <div class="story-wrapper" id="story-feed">
        <div id="loading" class="slide flex items-center justify-center text-white text-xs tracking-widest uppercase">
            Fetching Hot Trends...
        </div>
    </div>

    <script>
        const TMDB_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
        const GEMINI_KEY = 'AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE';
        const MAIN_SITE = 'https://u-tv-review.pages.dev/'; // Aapka main link
        const SLIDE_TIME = 5000;

        async function createWebStory() {
            const feed = document.getElementById('story-feed');
            const pContainer = document.getElementById('p-container');

            try {
                // Aaj ki sabse zyada search hone wali movies
                const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_KEY}`);
                const data = await res.json();
                const movies = data.results.slice(0, 6);

                document.getElementById('loading').remove();

                movies.forEach((movie, i) => {
                    // Create Slide
                    const slide = document.createElement('div');
                    slide.className = "slide";
                    slide.innerHTML = `
                        <img src="https://image.tmdb.org/t/p/w780${movie.poster_path}" class="w-full h-full object-cover">
                        <div class="text-overlay">
                            <span class="trending-tag">Global Trend #${i+1}</span>
                            <h2 class="text-white text-3xl font-black italic uppercase leading-none mb-3">${movie.title}</h2>
                            <p id="ai-${movie.id}" class="text-yellow-400 font-bold text-lg leading-tight drop-shadow-md">
                                Exclusive AI Insight Loading...
                            </p>
                        </div>
                    `;
                    feed.appendChild(slide);

                    // Create Progress Bar
                    pContainer.innerHTML += `<div class="progress-bar"><div class="progress-inner" id="bar-${i}"></div></div>`;

                    getAISummary(movie.title, movie.id);
                });

                // Final Call-To-Action Slide
                const lastSlide = document.createElement('div');
                lastSlide.className = "slide flex flex-col items-center justify-center bg-zinc-950 p-6 text-center";
                lastSlide.innerHTML = `
                    <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mb-6 shadow-2xl animate-bounce">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                    <h2 class="text-white text-4xl font-black mb-4 uppercase">Unlock Full Reviews</h2>
                    <p class="text-zinc-400 mb-10 text-lg italic">Read hidden details and leaked plot summaries of today's hottest movies.</p>
                    <a href="${MAIN_SITE}" class="bg-white text-black font-black py-5 px-12 rounded-full text-xl shadow-[0_0_30px_rgba(255,255,255,0.4)] hover:scale-105 transition-transform">
                        READ MORE NOW
                    </a>
                `;
                feed.appendChild(lastSlide);
                pContainer.innerHTML += `<div class="progress-bar"><div class="progress-inner" id="bar-last"></div></div>`;

                startStoryEngine(feed);

            } catch (err) { console.log("Feed Error"); }
        }

        async function getAISummary(title, id) {
            const box = document.getElementById(`ai-${id}`);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Write a 1-line viral, mysterious English hook for the movie '${title}'. Why is it trending? Max 15 words.` }] }]
                    })
                });
                const data = await response.json();
                box.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                box.innerText = "The plot twist that left everyone speechless today!";
            }
        }

        function startStoryEngine(feed) {
            const slides = feed.querySelectorAll('.slide');
            let current = 0;

            function play() {
                if (current >= slides.length) current = 0;
                feed.scrollTo({ left: slides[current].offsetLeft, behavior: 'smooth' });

                // Reset all bars
                document.querySelectorAll('.progress-inner').forEach((bar, i) => {
                    bar.style.transition = 'none';
                    bar.style.width = i < current ? '100%' : '0%';
                });

                // Animate current bar
                const currentBar = document.getElementById(`bar-${current}`) || document.getElementById('bar-last');
                setTimeout(() => {
                    currentBar.style.transition = `width ${SLIDE_TIME}ms linear`;
                    currentBar.style.width = '100%';
                }, 50);

                current++;
            }

            play();
            setInterval(play, SLIDE_TIME);
        }

        createWebStory();
    </script>
</body>
</html>
