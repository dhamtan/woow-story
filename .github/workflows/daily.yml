name: Daily Stories
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  stories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          pip install requests
          echo '<h1>Daily Story Generated $(date)</h1>' > index.html
          echo '<h1>English Story $(date)</h1>' > en.html
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Daily stories
